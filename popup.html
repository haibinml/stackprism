<!doctype html>
<html lang="zh-CN">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StackPrism 栈棱镜</title>
    <link rel="stylesheet" href="popup.css">
  </head>

  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>StackPrism 栈棱镜</h1>
          <p id="pageUrl" class="url">正在检测当前标签页...</p>
        </div>
        <div class="actions">
          <button id="settingsBtn" type="button" title="打开设置页">设置</button>
          <button id="refreshBtn" type="button" title="重新检测">刷新</button>
          <button id="copyBtn" type="button" title="复制检测 JSON">复制</button>
        </div>
      </header>

      <section id="status" class="status">正在收集页面运行时、资源和响应头线索。</section>

      <section class="summary" aria-label="检测概览">
        <div>
          <span id="totalCount">0</span>
          <label>技术</label>
        </div>
        <div>
          <span id="resourceCount">0</span>
          <label>资源</label>
        </div>
        <div>
          <span id="headerCount">0</span>
          <label>响应头</label>
        </div>
      </section>

      <nav id="categoryTabs" class="tabs" aria-label="技术分类过滤"></nav>

      <section id="sections" class="sections"></section>

      <section class="source-search" aria-label="网页源代码搜索">
        <div class="panel-title">网页源代码搜索</div>
        <div class="search-row">
          <input id="sourceQuery" type="search" placeholder="输入关键词或正则表达式">
          <button id="sourceSearchBtn" type="button">搜索</button>
        </div>
        <div class="search-options">
          <label><input id="caseSensitive" type="checkbox"> 区分大小写</label>
          <label><input id="wholeWord" type="checkbox"> 全字匹配</label>
          <label><input id="useRegex" type="checkbox"> 正则表达式</label>
        </div>
        <div id="searchMeta" class="search-meta">搜索当前页面 DOM 源码快照。</div>
        <pre id="sourceSearchOutput" class="search-output"></pre>
      </section>

      <details class="raw-panel">
        <summary>原始线索</summary>
        <pre id="rawOutput"></pre>
      </details>
    </main>
    <script src="popup.js"></script>
  </body>

</html>
